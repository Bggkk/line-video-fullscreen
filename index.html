<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>滿版播放</title>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: Arial, "Microsoft JhengHei", sans-serif;
        }

        #videoPlayer,
        #imageViewer {
            width: 100vw;
            height: 100vh;
            background: #000;
            object-fit: cover;
            display: none;
        }

        #loadingBox,
        #errorBox {
            color: white;
            font-size: 18px;
            padding: 24px;
            line-height: 1.7;
        }

        #hint {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 76px;
            text-align: center;
            color: rgba(255, 255, 255, 0.75);
            font-size: 14px;
            pointer-events: none;
        }

        #shareBar {
            position: fixed;
            left: 12px;
            right: 12px;
            bottom: 18px;
            display: none;
            gap: 10px;
            z-index: 999;
        }

        .btn {
            flex: 1;
            border: none;
            border-radius: 12px;
            padding: 14px 10px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
        }

        #shareBtn {
            background: #06C755;
        }

        #playBtn {
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(6px);
        }

        #toast {
            position: fixed;
            left: 20px;
            right: 20px;
            top: 20px;
            display: none;
            background: rgba(0, 0, 0, 0.78);
            color: #fff;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.5;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div id="loadingBox">載入中...</div>

<video
    id="videoPlayer"
    controls
    autoplay
    playsinline
    webkit-playsinline
></video>

<img id="imageViewer" alt="滿版圖片">

<div id="hint" style="display:none;">點一下影片可播放 / 暫停</div>

<div id="shareBar">
    <button id="playBtn" class="btn">播放 / 暫停</button>
    <button id="shareBtn" class="btn">分享卡片</button>
</div>

<div id="toast"></div>

<script>
    const LIFF_ID = "2009302184-0a7wKvsz";

    function getMergedParams() {
        const finalParams = new URLSearchParams(window.location.search);

        const liffState = finalParams.get("liff.state");

        if (liffState) {
            let stateText = decodeURIComponent(liffState);

            if (stateText.startsWith("/")) {
                stateText = stateText.substring(1);
            }

            if (stateText.startsWith("?")) {
                stateText = stateText.substring(1);
            }

            const stateParams = new URLSearchParams(stateText);

            stateParams.forEach(function (value, key) {
                finalParams.set(key, value);
            });
        }

        return finalParams;
    }

    const params = getMergedParams();

    let type = params.get("type") || "";
    const videoUrl = params.get("videoUrl") || "";
    const imageUrl = params.get("imageUrl") || "";
    const previewUrl = params.get("previewUrl") || "https://dummyimage.com/1280x720/000000/ffffff.png&text=VIDEO";
    const fit = params.get("fit") || "cover";
    const aspectRatio = params.get("aspectRatio") || "16:9";

    if (!type) {
        if (videoUrl) {
            type = "video";
        } else if (imageUrl) {
            type = "image";
        }
    }

    const loadingBox = document.getElementById("loadingBox");
    const video = document.getElementById("videoPlayer");
    const imageViewer = document.getElementById("imageViewer");
    const hint = document.getElementById("hint");
    const shareBar = document.getElementById("shareBar");
    const shareBtn = document.getElementById("shareBtn");
    const playBtn = document.getElementById("playBtn");
    const toast = document.getElementById("toast");

    function showToast(message) {
        toast.innerHTML = message;
        toast.style.display = "block";

        setTimeout(function () {
            toast.style.display = "none";
        }, 2600);
    }

    function showError(message) {
        document.body.innerHTML = `
            <div id="errorBox">
                ${message}
            </div>
        `;
    }

    function getLiffUrl() {
        const url = new URL("https://liff.line.me/" + LIFF_ID);

        url.searchParams.set("type", type);
        url.searchParams.set("aspectRatio", aspectRatio);
        url.searchParams.set("fit", fit);

        if (type === "video") {
            url.searchParams.set("videoUrl", videoUrl);
            url.searchParams.set("previewUrl", previewUrl);
        }

        if (type === "image") {
            url.searchParams.set("imageUrl", imageUrl);
        }

        return url.toString();
    }

    function buildVideoFlexMessage() {
        const liffUrl = getLiffUrl();

        return {
            type: "flex",
            altText: "🎬 影片卡片",
            contents: {
                type: "bubble",
                size: "giga",
                hero: {
                    type: "video",
                    url: videoUrl,
                    previewUrl: previewUrl,
                    aspectRatio: aspectRatio,
                    altContent: {
                        type: "image",
                        url: previewUrl,
                        size: "full",
                        aspectMode: "cover",
                        aspectRatio: aspectRatio
                    },
                    action: {
                        type: "uri",
                        label: "播放影片",
                        uri: videoUrl
                    }
                },
                footer: {
                    type: "box",
                    layout: "vertical",
                    spacing: "sm",
                    contents: [
                        {
                            type: "button",
                            style: "primary",
                            height: "sm",
                            action: {
                                type: "uri",
                                label: "分享影片卡片",
                                uri: liffUrl
                            }
                        }
                    ]
                }
            }
        };
    }

    function buildImageFlexMessage() {
        const liffUrl = getLiffUrl();

        return {
            type: "flex",
            altText: "🖼️ 圖片卡片",
            contents: {
                type: "bubble",
                size: "giga",
                hero: {
                    type: "image",
                    url: imageUrl,
                    size: "full",
                    aspectMode: "cover",
                    aspectRatio: aspectRatio,
                    action: {
                        type: "uri",
                        label: "分享圖片卡片",
                        uri: liffUrl
                    }
                },
                footer: {
                    type: "box",
                    layout: "vertical",
                    spacing: "sm",
                    contents: [
                        {
                            type: "button",
                            style: "primary",
                            height: "sm",
                            action: {
                                type: "uri",
                                label: "分享圖片卡片",
                                uri: liffUrl
                            }
                        }
                    ]
                }
            }
        };
    }

    function buildFlexMessage() {
        if (type === "image") {
            return buildImageFlexMessage();
        }

        return buildVideoFlexMessage();
    }

    async function initLiff() {
        try {
            await liff.init({
                liffId: LIFF_ID
            });
        } catch (error) {
            showToast("LIFF 初始化失敗");
        }
    }

    async function shareCard() {
        try {
            if (!liff.isInClient()) {
                showToast("請在 LINE 裡面開啟，才能分享卡片");
                return;
            }

            if (!liff.isApiAvailable("shareTargetPicker")) {
                showToast("你的 LINE 版本不支援分享選擇器");
                return;
            }

            const result = await liff.shareTargetPicker([
                buildFlexMessage()
            ]);

            if (result) {
                showToast("已送出卡片");
            } else {
                showToast("已取消分享");
            }

        } catch (error) {
            showToast("分享失敗，請再試一次");
        }
    }

    function setupVideo() {
        if (!videoUrl) {
            showError(
                "沒有影片網址<br>" +
                "請從 LINE Bot 產生影片滿版連結"
            );
            return;
        }

        loadingBox.innerHTML = "影片載入中...";

        video.src = videoUrl;

        if (fit === "contain") {
            video.style.objectFit = "contain";
        } else {
            video.style.objectFit = "cover";
        }

        video.addEventListener("loadeddata", function () {
            loadingBox.style.display = "none";
            video.style.display = "block";
            hint.style.display = "block";
            shareBar.style.display = "flex";
            playBtn.style.display = "block";
            shareBtn.innerHTML = "分享影片卡片";

            video.play().catch(function () {});
        });

        video.addEventListener("error", function () {
            showError(
                "影片載入失敗<br><br>" +
                "請確認影片網址是可直接播放的 mp4 網址，而且是 https:// 開頭"
            );
        });

        video.addEventListener("click", function () {
            if (video.paused) {
                video.play();
            } else {
                video.pause();
            }
        });

        playBtn.addEventListener("click", function () {
            if (video.paused) {
                video.play();
            } else {
                video.pause();
            }
        });
    }

    function setupImage() {
        if (!imageUrl) {
            showError(
                "沒有圖片網址<br>" +
                "請從 LINE Bot 產生圖片滿版連結"
            );
            return;
        }

        loadingBox.innerHTML = "圖片載入中...";

        if (fit === "contain") {
            imageViewer.style.objectFit = "contain";
        } else {
            imageViewer.style.objectFit = "cover";
        }

        imageViewer.onload = function () {
            loadingBox.style.display = "none";
            imageViewer.style.display = "block";
            hint.style.display = "none";
            shareBar.style.display = "flex";
            playBtn.style.display = "none";
            shareBtn.innerHTML = "分享圖片卡片";
        };

        imageViewer.onerror = function () {
            showError(
                "圖片載入失敗<br><br>" +
                "請確認圖片網址是可直接開啟的 https 圖片網址"
            );
        };

        imageViewer.src = imageUrl;
    }

    shareBtn.addEventListener("click", function () {
        shareCard();
    });

    initLiff();

    if (type === "image") {
        setupImage();
    } else if (type === "video") {
        setupVideo();
    } else {
        showError(
            "沒有指定滿版類型<br>" +
            "請從 LINE Bot 產生圖片或影片滿版連結"
        );
    }
</script>

</body>
</html>
