<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影片滿版播放</title>

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        #videoPlayer {
            width: 100vw;
            height: 100vh;
            background: #000;
            object-fit: cover;
        }

        #loadingBox,
        #errorBox {
            color: white;
            font-size: 18px;
            padding: 24px;
            line-height: 1.7;
        }

        #hint {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 18px;
            text-align: center;
            color: rgba(255, 255, 255, 0.75);
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="loadingBox">影片載入中...</div>

<video
    id="videoPlayer"
    controls
    autoplay
    playsinline
    webkit-playsinline
    style="display:none;"
></video>

<div id="hint" style="display:none;">點一下影片可播放 / 暫停</div>

<script>
    const params = new URLSearchParams(window.location.search);

    const videoUrl = params.get("videoUrl");
    const fit = params.get("fit") || "cover";

    const loadingBox = document.getElementById("loadingBox");
    const video = document.getElementById("videoPlayer");
    const hint = document.getElementById("hint");

    function showError(message) {
        document.body.innerHTML = `
            <div id="errorBox">
                ${message}
            </div>
        `;
    }

    if (!videoUrl) {
        showError("沒有影片網址<br>請從 LINE Bot 產生影片滿版連結");
    } else {
        video.src = videoUrl;

        if (fit === "contain") {
            video.style.objectFit = "contain";
        } else {
            video.style.objectFit = "cover";
        }

        video.addEventListener("loadeddata", function () {
            loadingBox.style.display = "none";
            video.style.display = "block";
            hint.style.display = "block";

            video.play().catch(function () {});
        });

        video.addEventListener("error", function () {
            showError(
                "影片載入失敗<br><br>" +
                "請確認影片網址是可直接播放的 mp4 網址，而且是 https:// 開頭"
            );
        });

        video.addEventListener("click", function () {
            if (video.paused) {
                video.play();
            } else {
                video.pause();
            }
        });
    }
</script>

</body>
</html>
